version: '3.8'

services:
  api:
    build: .
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DB_DRIVER=sqlite
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
    volumes:
      - ./alsat.db:/app/alsat.db
    restart: unless-stopped

